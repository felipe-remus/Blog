<main class="pagina-login">
    <div class="login-container">
        <!-- Abas -->
        <div class="abas-login">
            <button type="button" class="aba ativa" data-aba="login">Entrar</button>
            <button type="button" class="aba" data-aba="registro">Criar Conta</button>
        </div>

        <!-- Login -->
        <form id="form-login" class="formulario ativo">
            <div class="campo">
                <label for="email-login">Email ou Nome de Usuário</label>
                <input type="email" id="email-login" required>
            </div>
            <div class="campo">
                <label for="senha-login">Senha</label>
                <input type="password" id="senha-login" required>
            </div>
            <button type="submit" class="botao-de-login">Entrar</button>
        </form>

        <!-- Resgistro -->
    <form id="form-registro" class="formulario">
        <div class="campo">
            <label for="nome-registro">Nome</label>
            <input type="text" id="nome-registro" required>
        </div>
        <div class="campo">
            <label for="usuario-registro">Nome de Usuário</label>
            <input type="text" id="usuario-registro" required>
        </div>
        <div class="campo">
            <label for="email-registro">Email</label>
            <input type="email" id="email-registro" required>
        </div>

        <!-- Linha com CPF e Telefone -->
        <div class="campo-linha">
            <div class="subcampo">
                <label for="cpf-registro">CPF</label>
                <input type="text" id="cpf-registro" placeholder="000.000.000.00">
            </div>
            <div class="subcampo">
                <label for="telefone-registro">Telefone</label>
                <input type="tel" id="telefone-registro" placeholder="(00) 00000-0000">
            </div>
        </div>
        <script>
            // Formatação CPF
            document.getElementById('cpf-registro').addEventListener('input', function(e) {
                var value = e.target.value;
                var cpfPattern = value.replace(/\D/g, '') // Remove qualquer coisa que não seja número
                                    .replace(/(\d{3})(\d)/, '$1.$2') // Adiciona ponto após o terceiro dígito
                                    .replace(/(\d{3})(\d)/, '$1.$2') // Adiciona ponto após o sexto dígito
                                    .replace(/(\d{3})(\d)/, '$1-$2') // Adiciona traço após o nono dígito
                                    .replace(/(-\d{2})\d+?$/, '$1'); // Impede entrada de mais de 11 dígitos
                e.target.value = cpfPattern;
            });

            //Formatação Numero
            document.getElementById('telefone-registro').addEventListener('input', function(e) {
                var value = e.target.value;
                var telPattern = value.replace(/\D/g, '')
                                    .replace(/(\d{2})(\d)/, '($1) $2')
                                    .replace(/(\(\d{2}\)\s\d{5})(\d)/, '$1-$2')
                                    .replace(/(-\d{4})\d+?$/, '$1');        
                e.target.value = telPattern;
                });
        </script>

        <div class="campo">
            <label for="senha-registro">Senha</label>
            <input type="password" id="senha-registro" required>
        </div>
        <div class="campo">
            <label for="confirmar-senha">Confirmar Senha</label>
            <input type="password" id="confirmar-senha" required>
        </div>
        <button type="submit" class="botao-de-login">Criar Conta</button>
    </form>
</main>
